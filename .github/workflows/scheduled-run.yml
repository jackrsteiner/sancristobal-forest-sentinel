# Manual remote pipeline trigger (epic E11 closed 2026-07-18 — see docs/work-plan.md).
# Scheduling is owned by the on-VM systemd timer (forest-sentinel-pipeline.timer,
# daily 03:00 UTC, installed by vm_setup.sh); the Actions-cron path was retired as
# redundant. This workflow remains as a manual, no-SSH-client-needed way to kick a
# run from the GitHub UI.
#
# The VM owns the Earth Engine credentials and the COG store; this workflow just
# starts the systemd unit over SSH. Authentication uses Workload Identity
# Federation (set up per instance by scripts/setup_wif.sh) — short-lived OIDC
# tokens, no service-account keys.
#
# Required repository variables (printed by scripts/setup_wif.sh):
#   WIF_PROVIDER     workload identity provider resource name
#   PROVISIONER_SA   service account email to impersonate
# The project / VM name / zone come from the committed config/instance.env.

name: Run pipeline now (manual)

on:
  workflow_dispatch:

permissions:
  id-token: write   # OIDC token for Workload Identity Federation
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load instance config
        run: |
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' config/instance.env >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.PROVISIONER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger the pipeline run on the VM
        run: |
          gcloud compute ssh "${INSTANCE_NAME:-forest-sentinel-vm}" \
            --project "${PROJECT_ID}" \
            --zone "${ZONE:-us-west1-a}" \
            --command "sudo systemctl start forest-sentinel-pipeline.service"
