<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Forest Sentinel</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; display: flex; height: 100vh; }
      #sidebar { width: 360px; padding: 16px; overflow-y: auto; border-right: 1px solid #ddd; }
      #map { flex: 1; }
      h1 { font-size: 18px; margin: 0 0 12px; }
      h2 { font-size: 14px; margin: 16px 0 6px; }
      #add-aoi input[type="file"] { max-width: 100%; font-size: 12px; }
      .upload-error { color: #c0392b; }
      #pipeline-controls { margin: 12px 0 4px; }
      #run-now-status { font-size: 12px; margin-left: 6px; }
      select, button { font: inherit; padding: 6px; }
      .event { border: 1px solid #ddd; border-radius: 6px; padding: 8px; margin: 8px 0; cursor: pointer; }
      .event.selected { border-color: #c0392b; }
      .status-new { color: #2980b9; }
      .status-ongoing { color: #c0392b; }
      .status-resolved { color: #7f8c8d; }
      /* Manual-review opinions: outlined badges, visually distinct from the
         filled-text automatic status so machine truth and human judgment never
         blend. */
      .opinion {
        border: 1px solid currentColor; border-radius: 3px; padding: 0 4px;
        font-size: 11px; margin-left: 4px;
      }
      .opinion-confirmed { color: #27ae60; }
      .opinion-false_positive { color: #c0392b; }
      .opinion-uncertain { color: #e67e22; }
      .opinion-resolved { color: #7f8c8d; }
      /* Confidence level: filled pill, third visual axis beside status + opinion. */
      .conf {
        border-radius: 3px; padding: 0 5px; font-size: 11px; margin-left: 4px; color: #fff;
      }
      .conf-high { background: #27ae60; }
      .conf-medium { background: #e67e22; }
      .conf-low { background: #95a5a6; }
      /* Detection basis (E16/#119): which sensor kind(s) saw it — fourth
         visual axis, filled like confidence but in sensor hues. */
      .basis {
        border-radius: 3px; padding: 0 5px; font-size: 11px; margin-left: 4px; color: #fff;
      }
      .basis-optical-only { background: #3498db; }
      .basis-radar-only { background: #8e44ad; }
      .basis-both { background: #16a085; }
      /* Context layers (E17/#127): overlay toggles + guarded upload. */
      .context-item { display: block; font-size: 12px; margin: 3px 0; cursor: pointer; }
      .context-swatch {
        display: inline-block; width: 10px; height: 10px; border-radius: 2px;
        margin: 0 4px 0 2px; vertical-align: baseline;
      }
      #add-context input, #add-context select { margin: 2px 0; font-size: 12px; }
      body.context-uploads-disabled #add-context { display: none; }
      /* AOI mutations (#149): uploads and the disable toggle share one guard. */
      body.aoi-uploads-disabled #add-aoi, body.aoi-uploads-disabled #aoi-toggle { display: none; }
      #aoi-toggle { font-size: 11px; padding: 2px 6px; margin-left: 4px; }
      .conf-explain { font-size: 12px; color: #555; margin: 2px 0 2px 12px; }
      .conf-history { font-size: 12px; color: #888; margin: 2px 0 2px 12px; }
      #event-filters { margin: 8px 0 2px; font-size: 12px; }
      #event-filters select { font-size: 12px; padding: 2px; }
      .review-form { margin-top: 6px; }
      .review-form button { font-size: 11px; padding: 2px 6px; margin: 2px 4px 2px 0; }
      .review-form input { font-size: 12px; width: 100%; margin-top: 4px; padding: 3px; }
      .review-entry { font-size: 12px; color: #555; margin: 2px 0; }
      body.reviews-disabled .review-form { display: none; }
      body.settings-edit-disabled .setting-edit { display: none; }
      /* Run now / Stop / Re-assess share the compute-trigger guard (#168). */
      body.pipeline-trigger-disabled #pipeline-controls { display: none; }
      .setting { margin: 6px 0; }
      .setting-edit input, .setting-edit select { width: 110px; }
      .timeline { font-size: 13px; margin: 6px 0; }
      /* Persistence trajectory (#165): state pill reuses the dashboard's
         status hues; the sparkline is a single neutral-blue series with values
         carried by muted text, never by the series color. */
      .persistence-state {
        border-radius: 3px; padding: 0 5px; font-size: 11px; margin-left: 6px; color: #fff;
      }
      .state-persistent { background: #c0392b; }
      .state-recovering { background: #e67e22; }
      .state-transient { background: #7f8c8d; }
      .trajectory-svg { display: block; width: 100%; height: 56px; margin: 2px 0; }
      .trajectory-note { font-size: 12px; margin: 2px 0 2px 12px; }
      .evidence { font-size: 12px; color: #555; }
      .muted { color: #888; }
      #runs { margin: 12px 0; }
      .run { border: 1px solid #ddd; border-radius: 6px; padding: 8px; margin: 8px 0; font-size: 13px; }
      .run-line { font-size: 12px; color: #555; margin: 2px 0; }
      .run-status-running { color: #2980b9; }
      .run-status-succeeded { color: #27ae60; }
      .run-status-partial { color: #e67e22; }
      .run-status-failed, .run-status-interrupted { color: #c0392b; }
      .methodology {
        margin: 8px 0; padding: 4px 8px; font-size: 12px; color: #555;
        border-left: 3px solid #ccc; background: #f6f6f6; border-radius: 0 4px 4px 0;
      }
      .methodology summary { cursor: pointer; }
      .methodology .param { margin: 2px 0 2px 14px; overflow-wrap: anywhere; }
      .run-progress { margin: 10px 0 6px; font-variant-numeric: tabular-nums; }
      .run-progress-label { margin-bottom: 4px; }
      .progress-track { height: 6px; background: #e4e4e4; border-radius: 3px; overflow: hidden; }
      .progress-fill { height: 100%; background: #2980b9; transition: width 0.5s; }
      .run-progress-counters { font-size: 12px; margin-top: 4px; }
      /* Fixed-height scrollable console (#150): older messages stay reachable
         without the card growing as events accumulate. */
      .run-events {
        margin-top: 8px; border-top: 1px solid #eee; padding-top: 4px;
        max-height: 150px; overflow-y: auto;
      }
      /* Hanging indent: a wrapped event reads as one entry, not garbled lines. */
      .run-event {
        font-size: 12px; color: #555; margin: 4px 0; padding-left: 14px; text-indent: -14px;
        font-variant-numeric: tabular-nums;
      }
      .run-event-failed { color: #c0392b; }
      .run-event-warning { color: #e67e22; }
      /* Map controls (#145/#153): basemap buttons + click-to-copy toast. */
      .basemap-switcher { display: flex; gap: 4px; }
      /* GIBS date slider (#158): shown only while Daily satellite is active. */
      .gibs-slider {
        display: flex; flex-direction: column; gap: 2px; padding: 6px 10px;
        background: #fff; border: 2px solid rgba(0, 0, 0, 0.25); border-radius: 4px;
      }
      .gibs-slider[hidden] { display: none; }
      .gibs-slider-row { display: flex; align-items: center; gap: 4px; }
      .gibs-step {
        font: 14px/1.2 inherit; padding: 1px 7px; cursor: pointer;
        background: #fff; border: 1px solid #bbb; border-radius: 3px;
      }
      .gibs-step:hover { background: #f4f4f4; }
      .gibs-slider-mid { display: flex; flex-direction: column; gap: 1px; }
      /* Observation-quality ticks (#160): the horizontal padding approximates
         the range thumb's half-width so slots align with slider positions. */
      .gibs-ticks { display: flex; height: 5px; padding: 0 7px; }
      .gibs-tick { flex: 1; margin: 0 0.5px; border-radius: 1px; }
      .tick-good { background: #27ae60; }
      .tick-mid { background: #e67e22; }
      .tick-poor { background: #95a5a6; }
      .gibs-slider input[type="range"] { width: 170px; margin: 0; }
      .gibs-slider-label { font-size: 11px; text-align: center; font-variant-numeric: tabular-nums; }
      .basemap-toggle {
        font: inherit; font-size: 12px; padding: 4px 8px; cursor: pointer;
        background: #fff; border: 2px solid rgba(0, 0, 0, 0.25); border-radius: 4px;
      }
      .basemap-toggle:hover { background: #f4f4f4; }
      .coord-toast {
        position: absolute; bottom: 14px; left: 50%; transform: translateX(-50%);
        z-index: 1100; /* above Leaflet panes and controls */
        background: rgba(0, 0, 0, 0.75); color: #fff; font-size: 12px;
        padding: 5px 10px; border-radius: 4px; pointer-events: none;
        opacity: 0; transition: opacity 0.3s; white-space: pre-line; text-align: center;
      }
      .coord-toast.visible { opacity: 1; }
      /* Settings slide-out (#151): full height over the map area only — the
         sidebar stays usable; the map stays mounted underneath. */
      #sidebar-header { display: flex; align-items: baseline; justify-content: space-between; }
      #settings-open {
        font-size: 16px; padding: 2px 6px; background: none; border: none; cursor: pointer;
      }
      #settings-panel {
        position: fixed; top: 0; right: 0; bottom: 0; left: 360px; /* sidebar width */
        z-index: 1200; /* above Leaflet panes and controls */
        background: #fff; border-left: 1px solid #ddd; padding: 16px;
        overflow-y: auto; transform: translateX(100%); transition: transform 0.25s;
      }
      body.settings-visible #settings-panel { transform: translateX(0); }
      #settings-header { display: flex; align-items: baseline; justify-content: space-between; }
      #settings-header h2 { margin: 0 0 6px; }
      #settings-close {
        font-size: 14px; padding: 2px 8px; background: none; border: none; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <div id="sidebar-header">
        <h1>Open Forest Sentinel</h1>
        <button id="settings-open" title="Settings" aria-label="Open settings">&#9881;&#65039;</button>
      </div>
      <label>AOI: <select id="aoi-select"></select></label>
      <button id="aoi-toggle" hidden></button>
      <div id="summary" class="muted"></div>
      <div id="pipeline-controls">
        <button id="run-now">Run pipeline now</button>
        <button id="stop-run">Stop run</button>
        <button id="assess-now" title="Re-score event confidence from local data (no Earth Engine)">Re-assess</button>
        <span id="run-now-status" class="muted"></span>
      </div>
      <div id="runs"></div>
      <div id="event-filters" class="muted">
        status
        <select id="filter-status">
          <option value="">all</option>
          <option value="new">new</option>
          <option value="ongoing">ongoing</option>
          <option value="resolved">resolved</option>
        </select>
        opinion
        <select id="filter-opinion">
          <option value="">all</option>
          <option value="unreviewed">unreviewed</option>
          <option value="confirmed">confirmed</option>
          <option value="false_positive">false positive</option>
          <option value="uncertain">uncertain</option>
          <option value="resolved">resolved</option>
        </select>
        confidence
        <select id="filter-confidence">
          <option value="">all</option>
          <option value="high">high</option>
          <option value="medium">medium</option>
          <option value="low">low</option>
          <option value="unassessed">unassessed</option>
        </select>
        basis
        <select id="filter-basis">
          <option value="">all</option>
          <option value="optical-only">optical</option>
          <option value="radar-only">radar</option>
          <option value="both">optical+radar</option>
        </select>
      </div>
      <div id="events"></div>
      <div id="context-layers">
        <h2>Context layers</h2>
        <div id="context-layer-list" class="muted"></div>
        <div id="add-context">
          <select id="context-kind">
            <option value="concession">concession</option>
            <option value="protected_area">protected area</option>
            <option value="road">road</option>
            <option value="river">river</option>
            <option value="settlement">settlement</option>
            <option value="mill">mill</option>
            <option value="port">port</option>
            <option value="other">other</option>
          </select>
          <input type="text" id="context-name" placeholder="layer name" />
          <input type="file" id="context-file" accept=".geojson,.json" />
          <button id="context-upload">Upload layer</button>
          <div id="context-upload-status" class="muted"></div>
        </div>
      </div>
      <div id="methodologies">
        <h2>Methodologies</h2>
        <div id="methodology-list"></div>
      </div>
      <div id="add-aoi">
        <h2>Add AOI</h2>
        <input type="file" id="aoi-file" accept=".geojson,.json" />
        <button id="aoi-upload">Upload</button>
        <div id="aoi-upload-status" class="muted"></div>
      </div>
    </div>
    <div id="map"></div>
    <!-- Settings slide-out (#151): covers the map area, opened by the sidebar
         gear. Content and behavior are unchanged from the old sidebar section —
         the catalogue just gets the room it needs. -->
    <div id="settings-panel" aria-hidden="true">
      <div id="settings-header">
        <h2>Settings</h2>
        <button id="settings-close" title="Close settings" aria-label="Close settings">&#10005;</button>
      </div>
      <div class="muted">
        Live values as the next run will resolve them. Changes are recorded without a
        user identity (tunnel-as-auth).
      </div>
      <div id="settings-list" class="muted">Loading…</div>
    </div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      // Zoom lives bottom-right (#152); the top-left corner belongs to the
      // basemap switcher.
      const map = L.map("map", { zoomControl: false }).setView([0, 0], 2);
      L.control.zoom({ position: "bottomright" }).addTo(map);
      // Basemap toggle (#145): streets (OSM), free satellite imagery (Esri
      // World Imagery — keyless XYZ, free with attribution, high-res but a
      // STATIC mosaic that may be years old), or NASA GIBS daily true color
      // (VIIRS, ~375 m — coarse, but refreshed every day, so it can show
      // yesterday's smoke/clearing that the Esri mosaic predates). Overlays
      // are unaffected: tile layers render below all vector panes.
      // GIBS tiles are per-day; default to yesterday (UTC) since today's swaths
      // are still filling in. A slider (#158) scrubs the past month: the date
      // is baked into the tile URL, so changing days is just layer.setUrl().
      const GIBS_SLIDER_DAYS = 30;
      function gibsDateForDaysAgo(daysAgo) {
        return new Date(Date.now() - daysAgo * 24 * 3600 * 1000).toISOString().slice(0, 10);
      }
      function gibsUrl(date) {
        return `https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/VIIRS_SNPP_CorrectedReflectance_TrueColor/default/${date}/GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg`;
      }
      function gibsAttribution(date) {
        return `NASA EOSDIS GIBS &mdash; VIIRS true color, ${date}, updated daily (~375 m)`;
      }
      let gibsDate = gibsDateForDaysAgo(1);
      const baseLayers = {
        streets: {
          label: "Streets",
          layer: L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "&copy; OpenStreetMap contributors",
            maxZoom: 19,
          }),
        },
        satellite: {
          label: "High-res satellite",
          layer: L.tileLayer(
            "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
            {
              attribution:
                "Imagery &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community",
              maxZoom: 19,
            },
          ),
        },
        gibs: {
          label: "Daily satellite",
          layer: L.tileLayer(gibsUrl(gibsDate), {
            attribution: gibsAttribution(gibsDate),
            maxNativeZoom: 9, // GIBS serves to z9; Leaflet upscales beyond
            maxZoom: 19,
          }),
        },
      };

      // Scrub the GIBS day (#158): swap the tile URL in place and keep the
      // attribution's date honest. Leaflet only auto-manages attribution on
      // layer add/remove, so an in-place change updates the control manually.
      function setGibsDate(date) {
        const clampedOldest = gibsDateForDaysAgo(GIBS_SLIDER_DAYS);
        const clampedNewest = gibsDateForDaysAgo(1);
        const clamped = date < clampedOldest ? clampedOldest : date > clampedNewest ? clampedNewest : date;
        if (clamped === gibsDate) return;
        const previous = gibsAttribution(gibsDate);
        gibsDate = clamped;
        baseLayers.gibs.layer.setUrl(gibsUrl(gibsDate));
        baseLayers.gibs.layer.options.attribution = gibsAttribution(gibsDate);
        if (activeBase === "gibs") {
          map.attributionControl.removeAttribution(previous);
          map.attributionControl.addAttribution(gibsAttribution(gibsDate));
        }
      }
      const baseOrder = ["streets", "satellite", "gibs"];
      let activeBase = "streets";
      baseLayers[activeBase].layer.addTo(map);

      // One button per NOT-displayed basemap (#153): any of the three layers
      // is a single click away, instead of cycling through the wrong one.
      const BasemapSwitcher = L.Control.extend({
        options: { position: "topleft" },
        onAdd() {
          const box = L.DomUtil.create("div", "basemap-switcher");
          // Control clicks must not fall through to the map (and copy coords).
          L.DomEvent.disableClickPropagation(box);
          const render = () => {
            box.textContent = "";
            baseOrder
              .filter((key) => key !== activeBase)
              .forEach((key) => {
                const button = L.DomUtil.create("button", "basemap-toggle", box);
                button.type = "button";
                button.textContent = baseLayers[key].label;
                button.title = `Switch base map to ${baseLayers[key].label}`;
                L.DomEvent.on(button, "click", () => {
                  map.removeLayer(baseLayers[activeBase].layer);
                  baseLayers[key].layer.addTo(map);
                  activeBase = key;
                  render();
                  syncGibsSlider();
                });
              });
          };
          render();
          return box;
        },
      });
      map.addControl(new BasemapSwitcher());

      // Date slider for the Daily satellite basemap (#158): visible only while
      // GIBS is active. Sliding right moves forward in time (rightmost =
      // yesterday); the label updates instantly, the tile swap is debounced.
      let gibsSliderBox = null;
      let gibsSliderInput = null;
      let gibsSliderLabel = null;
      let gibsSliderDebounce = null;
      let gibsTicksBox = null;
      let qualityByDate = {};
      const GibsSlider = L.Control.extend({
        options: { position: "bottomleft" },
        onAdd() {
          const box = L.DomUtil.create("div", "gibs-slider");
          // Slider interaction must neither pan the map nor copy coordinates.
          L.DomEvent.disableClickPropagation(box);
          L.DomEvent.disableScrollPropagation(box);
          const label = L.DomUtil.create("div", "gibs-slider-label", box);
          const row = L.DomUtil.create("div", "gibs-slider-row", box);
          const back = L.DomUtil.create("button", "gibs-step", row);
          back.type = "button";
          back.textContent = "‹";
          back.title = "Previous day";
          const mid = L.DomUtil.create("div", "gibs-slider-mid", row);
          // Observation-quality ticks (#160): one slot per slider day, dotted
          // and colored on days the detector itself had a (clear) look.
          gibsTicksBox = L.DomUtil.create("div", "gibs-ticks", mid);
          const input = L.DomUtil.create("input", "", mid);
          input.type = "range";
          input.min = "1";
          input.max = String(GIBS_SLIDER_DAYS);
          input.value = String(GIBS_SLIDER_DAYS);
          input.title = "Imagery date (past month)";
          const forward = L.DomUtil.create("button", "gibs-step", row);
          forward.type = "button";
          forward.textContent = "›";
          forward.title = "Next day";
          // Drags debounce the tile swap; the single-day step buttons apply
          // immediately — that's their point (precision scrubbing, #159).
          function applyValue(value, immediate) {
            const clamped = Math.min(GIBS_SLIDER_DAYS, Math.max(1, value));
            input.value = String(clamped);
            const daysAgo = GIBS_SLIDER_DAYS + 1 - clamped;
            label.textContent = gibsDateForDaysAgo(daysAgo);
            clearTimeout(gibsSliderDebounce);
            if (immediate) {
              setGibsDate(gibsDateForDaysAgo(daysAgo));
            } else {
              gibsSliderDebounce = setTimeout(() => setGibsDate(gibsDateForDaysAgo(daysAgo)), 150);
            }
          }
          L.DomEvent.on(input, "input", () => applyValue(Number(input.value), false));
          L.DomEvent.on(back, "click", () => applyValue(Number(input.value) - 1, true));
          L.DomEvent.on(forward, "click", () => applyValue(Number(input.value) + 1, true));
          gibsSliderBox = box;
          gibsSliderInput = input;
          gibsSliderLabel = label;
          label.textContent = gibsDate;
          box.hidden = activeBase !== "gibs";
          renderGibsTicks();
          return box;
        },
      });
      map.addControl(new GibsSlider());

      function syncGibsSlider() {
        if (!gibsSliderBox) return;
        gibsSliderBox.hidden = activeBase !== "gibs";
        let daysAgo = 1;
        for (let d = 1; d <= GIBS_SLIDER_DAYS; d += 1) {
          if (gibsDateForDaysAgo(d) === gibsDate) {
            daysAgo = d;
            break;
          }
        }
        gibsSliderInput.value = String(GIBS_SLIDER_DAYS + 1 - daysAgo);
        gibsSliderLabel.textContent = gibsDate;
      }

      // Observation-quality ticks (#160): color each slider day by the best
      // Fmask valid fraction among that day's HLS observations for the current
      // AOI — the days the detector itself could see are the ones worth
      // scrubbing to. Purely advisory; scrubbing behavior is unchanged.
      function renderGibsTicks() {
        if (!gibsTicksBox) return;
        gibsTicksBox.textContent = "";
        for (let value = 1; value <= GIBS_SLIDER_DAYS; value += 1) {
          const date = gibsDateForDaysAgo(GIBS_SLIDER_DAYS + 1 - value);
          const slot = document.createElement("span");
          slot.className = "gibs-tick";
          const quality = qualityByDate[date];
          if (quality) {
            slot.classList.add(
              quality.valid_fraction >= 0.7
                ? "tick-good"
                : quality.valid_fraction >= 0.3
                  ? "tick-mid"
                  : "tick-poor",
            );
            slot.title =
              `${date}: ${Math.round(quality.valid_fraction * 100)}% clear ` +
              `(${quality.observations} observation${quality.observations === 1 ? "" : "s"})`;
          } else {
            slot.title = `${date}: no observation`;
          }
          gibsTicksBox.appendChild(slot);
        }
      }

      async function loadObservationQuality(aoiId) {
        try {
          const data = await (
            await fetch(`/api/aois/${aoiId}/observation-quality?days=${GIBS_SLIDER_DAYS}`)
          ).json();
          qualityByDate = {};
          data.days.forEach((day) => {
            qualityByDate[day.date] = day;
          });
        } catch (e) {
          qualityByDate = {}; // advisory only — an unreachable API just clears the dots
        }
        renderGibsTicks();
      }

      // Review-tool hook (#158): clicking an event jumps the imagery to its
      // first-detected day (clamped into the slider's month) while GIBS is up.
      function jumpGibsToDate(iso) {
        if (activeBase !== "gibs" || !iso) return;
        setGibsDate(iso.slice(0, 10));
        syncGibsSlider();
      }

      // Click-to-copy coordinates (#145). Also fires when a click opens a
      // feature popup — harmless, the clicked point is still what's copied.
      const coordToast = L.DomUtil.create("div", "coord-toast", map.getContainer());
      let coordToastTimer = null;
      function showCoordToast(text) {
        coordToast.textContent = text;
        coordToast.classList.add("visible");
        clearTimeout(coordToastTimer);
        coordToastTimer = setTimeout(() => coordToast.classList.remove("visible"), 4000);
      }

      // Esri World Imagery is a static best-available mosaic, so the backdrop's
      // age matters when eyeballing a detection. The service's citation layers
      // expose per-source capture date/provider/resolution; `identify` with the
      // live map extent + pixel size (and layers=visible) picks the citation
      // matching the imagery actually rendered at this zoom (metadata is
      // scale-dependent).
      //
      // Identify responses key `attributes` by field ALIAS, and the aliases
      // differ per citation tier ("SRC_DATE2", "DATE", "DATE (YYYYMMDD)",
      // "RESOLUTION (M)", ...) — so keys are matched loosely, never exactly.
      function pickAttribute(attrs, pattern) {
        for (const [key, value] of Object.entries(attrs)) {
          if (pattern.test(key.toUpperCase())) return value;
        }
        return undefined;
      }

      function formatCaptureDate(raw) {
        if (raw == null) return null;
        const text = String(raw).trim();
        // 99999 is the service's "not recorded" sentinel.
        if (!text || text === "99999" || text.toLowerCase() === "null") return null;
        if (/^\d{8}$/.test(text)) return `${text.slice(0, 4)}-${text.slice(4, 6)}-${text.slice(6)}`;
        const num = Number(text);
        // esriFieldTypeDate can arrive as epoch milliseconds.
        if (Number.isFinite(num) && num > 1e11) return new Date(num).toISOString().slice(0, 10);
        const parsed = new Date(text);
        if (!Number.isNaN(parsed.getTime())) return parsed.toISOString().slice(0, 10);
        return null;
      }

      async function esriCaptureInfo(latlng) {
        const size = map.getSize();
        const bounds = map.getBounds();
        const params = new URLSearchParams({
          f: "json",
          geometry: JSON.stringify({ x: latlng.lng, y: latlng.lat, spatialReference: { wkid: 4326 } }),
          geometryType: "esriGeometryPoint",
          sr: "4326",
          tolerance: "1",
          returnGeometry: "false",
          layers: "visible", // only the tier rendered at this scale, not every tier
          mapExtent: [bounds.getWest(), bounds.getSouth(), bounds.getEast(), bounds.getNorth()].join(","),
          imageDisplay: `${size.x},${size.y},96`,
        });
        const response = await fetch(
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/identify?" + params,
        );
        const results = (await response.json()).results || [];
        for (const result of results) {
          const attrs = result.attributes || {};
          // "DATE", "DATE (YYYYMMDD)", "SRC_DATE2" — but not e.g. "UPDATED".
          const date = formatCaptureDate(pickAttribute(attrs, /(^|[^A-Z])DATE/));
          if (!date) continue;
          const parts = [];
          const provider =
            pickAttribute(attrs, /DESCRIPTION|NICE_DESC/) ??
            pickAttribute(attrs, /SOURCE|SRC_DESC/);
          if (provider && String(provider) !== "99999") parts.push(provider);
          parts.push(`captured ${date}`);
          const res = Number(pickAttribute(attrs, /RESOLUTION|SRC_RES/));
          if (Number.isFinite(res) && res > 0 && res !== 99999) parts.push(`${res} m`);
          return parts.join(" · ");
        }
        return null;
      }

      map.on("click", async (e) => {
        const point = e.latlng.wrap(); // longitude in [-180, 180] after panning
        const coords = `${point.lat.toFixed(6)}, ${point.lng.toFixed(6)}`;
        let message;
        try {
          // Secure contexts only (https or the localhost SSH tunnel).
          await navigator.clipboard.writeText(coords);
          message = `Copied ${coords}`;
        } catch {
          // No clipboard (e.g. world-open plain-http): still show the value.
          message = coords;
        }
        showCoordToast(message);
        if (activeBase !== "satellite") return;
        try {
          const info = await esriCaptureInfo(e.latlng);
          // Only append while this click's toast is still the one showing.
          if (info && coordToast.textContent === message) {
            showCoordToast(`${message}\nImagery: ${info}`);
          }
        } catch {
          // Metadata is best-effort garnish; the copy already succeeded.
        }
      });

      let eventsLayer = null;
      const layersById = {};
      const eventFirstDetectedById = {};
      const aoiBboxById = {};
      let currentAoiId = null;
      let currentCollection = null;
      // A "running" run whose last progress event is older than this is likely dead
      // (SIGKILL / systemd timeout before the next run flips it to "interrupted").
      const STALE_RUN_MS = 2 * 60 * 60 * 1000;
      // Runs-panel render state: skip identical re-renders across polls, and
      // remember the methodology toggle (per run id) across the ones that happen.
      let runsRenderKey = null;
      const methodologyOpen = {};

      const aoisById = {};
      async function loadAois(preferredId) {
        const aois = await (await fetch("/api/aois")).json();
        const select = document.getElementById("aoi-select");
        select.innerHTML = "";
        aois.forEach((aoi) => {
          aoiBboxById[aoi.id] = aoi.bbox;
          aoisById[aoi.id] = aoi;
          const option = document.createElement("option");
          option.value = aoi.id;
          option.textContent =
            `${aoi.name} (${aoi.event_count} events)` + (aoi.enabled ? "" : " — disabled");
          select.appendChild(option);
        });
        if (!aois.length) return;
        // Keep the current selection across a toggle-triggered reload.
        const selected = aois.some((aoi) => String(aoi.id) === String(preferredId))
          ? preferredId
          : aois[0].id;
        select.value = selected;
        updateAoiToggle();
        loadEvents(selected);
      }

      // Disable/re-enable the selected AOI for future pipeline runs (#149).
      // History stays browsable — only the run loop skips it. The button is
      // hidden for AOIs with no file to mark (the primary AOI) and, via the
      // aoi-uploads-disabled body class, on world-open dashboards.
      function updateAoiToggle() {
        const button = document.getElementById("aoi-toggle");
        const aoi = aoisById[document.getElementById("aoi-select").value];
        button.hidden = !aoi || !aoi.can_disable;
        if (aoi) button.textContent = aoi.enabled ? "Disable AOI" : "Enable AOI";
        button.title = aoi && aoi.enabled
          ? "Skip this AOI on future pipeline runs (events stay visible)"
          : "Include this AOI in future pipeline runs again";
      }

      async function toggleAoiEnabled() {
        const select = document.getElementById("aoi-select");
        const aoi = aoisById[select.value];
        if (!aoi || !aoi.can_disable) return;
        const response = await fetch(`/api/aois/${aoi.id}/enabled`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ enabled: !aoi.enabled }),
        });
        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          document.getElementById("summary").textContent =
            body.detail || `Toggle failed (HTTP ${response.status})`;
          return;
        }
        await loadAois(select.value);
      }

      // Zoom to the selected AOI: [min_lon, min_lat, max_lon, max_lat] → Leaflet's
      // [[south, west], [north, east]].
      function zoomToAoi(aoiId) {
        const bbox = aoiBboxById[aoiId];
        if (!bbox) return;
        map.fitBounds(
          [
            [bbox[1], bbox[0]],
            [bbox[3], bbox[2]],
          ],
          { maxZoom: 12 },
        );
      }

      async function loadEvents(aoiId) {
        currentAoiId = aoiId;
        zoomToAoi(aoiId);
        loadRuns(aoiId);
        loadObservationQuality(aoiId);
        currentCollection = await (await fetch(`/api/aois/${aoiId}/events`)).json();
        renderEvents();
        // The map frames the whole AOI (zoomToAoi above); clicking an event in
        // the list or on the map still zooms to that event.
      }

      // The automatic status and the manual opinion are independent axes; both
      // filters apply together (AND) so either or both can narrow the view.
      function featurePassesFilters(p) {
        const status = document.getElementById("filter-status").value;
        const opinion = document.getElementById("filter-opinion").value;
        const confidence = document.getElementById("filter-confidence").value;
        if (status && p.status !== status) return false;
        if (opinion === "unreviewed") {
          if (p.latest_opinion != null) return false;
        } else if (opinion && p.latest_opinion !== opinion) {
          return false;
        }
        if (confidence === "unassessed") {
          if (p.confidence_level != null) return false;
        } else if (confidence && p.confidence_level !== confidence) {
          return false;
        }
        const basis = document.getElementById("filter-basis").value;
        if (basis && p.basis !== basis) return false;
        return true;
      }

      const STATUS_COLORS = { ongoing: "#c0392b", new: "#2980b9", resolved: "#7f8c8d" };

      function renderEvents() {
        const all = currentCollection ? currentCollection.features : [];
        const features = all.filter((f) => featurePassesFilters(f.properties));
        if (eventsLayer) map.removeLayer(eventsLayer);
        // Drop layer references from the previous render so clicks can't zoom
        // to layers that are no longer on the map.
        Object.keys(layersById).forEach((id) => delete layersById[id]);
        // Stroke encodes the automatic status; fill opacity encodes confidence
        // (stronger evidence reads more solid on the map).
        const CONF_OPACITY = { high: 0.45, medium: 0.25, low: 0.1 };
        eventsLayer = L.geoJSON(
          { type: "FeatureCollection", features },
          {
            style: (f) => ({
              color: STATUS_COLORS[f.properties.status] || "#2980b9",
              weight: 2,
              fillOpacity: CONF_OPACITY[f.properties.confidence_level] ?? 0.2,
            }),
            onEachFeature: (feature, layer) => {
              layersById[feature.properties.id] = layer;
              eventFirstDetectedById[feature.properties.id] = feature.properties.first_detected_at;
              // Attribution at a glance (#119): the popup carries the same
              // status / basis badges as the card. Server-enumerated values
              // only — no free text — so innerHTML is safe here.
              layer.bindPopup(popupHtml(feature.properties));
              layer.on("click", () => showEvent(feature.properties.id));
            },
          },
        ).addTo(map);
        const filtered = features.length !== all.length ? ` (of ${all.length})` : "";
        document.getElementById("summary").textContent =
          `${features.length}${filtered} disturbance events`;
        renderEventList(features);
      }

      function runStatusLabel(run) {
        if (
          run.status === "running" &&
          run.last_event_at &&
          Date.now() - Date.parse(run.last_event_at) > STALE_RUN_MS
        ) {
          return "running (stale — possibly interrupted)";
        }
        return run.status;
      }

      function describeEvent(ev) {
        const where =
          ev.batch_index != null ? `${ev.stage} ${ev.batch_index}/${ev.batch_total}` : ev.stage;
        let what = ev.outcome === "info" ? ev.message : ev.outcome;
        if (ev.outcome === "submitted") {
          what = `${ev.exports} export${ev.exports === 1 ? "" : "s"} submitted, waiting on Earth Engine`;
        } else if (ev.outcome === "succeeded" && ev.message) {
          // "N exported, M reused, K candidates" is self-describing.
          what = ev.message;
        } else if (ev.outcome !== "info" && ev.message) {
          what = `${ev.outcome} — ${ev.message}`;
        }
        return `${where} · ${what}`;
      }

      // One entry per batch: a batch's terminal event (succeeded/failed) replaces
      // its "submitted" line in place, so the tail reads one line per batch
      // instead of a submitted/succeeded pair. Non-batch events keep their own line.
      function collapseEvents(events) {
        const entries = [];
        const slotByBatch = {};
        events.forEach((ev) => {
          const key = ev.batch_index != null ? `${ev.stage}:${ev.batch_index}` : null;
          if (key != null && key in slotByBatch) {
            entries[slotByBatch[key]] = ev;
            return;
          }
          if (key != null) slotByBatch[key] = entries.length;
          entries.push(ev);
        });
        return entries;
      }

      function eventLine(ev) {
        const line = document.createElement("div");
        line.className = "run-event";
        if (ev.outcome === "failed") line.classList.add("run-event-failed");
        if (ev.outcome === "warning") line.classList.add("run-event-warning");
        const when = document.createElement("span");
        when.className = "muted";
        // Time only: the card header already carries the date, and the tail
        // spans minutes, not days.
        when.textContent = `${fmtTime(ev.occurred_at)} `;
        line.appendChild(when);
        line.appendChild(document.createTextNode(describeEvent(ev)));
        return line;
      }

      // The run's non-data inputs: methodology identity, expandable to the full
      // parameter set (threshold, min area, baseline window, EE script version…).
      // At a glance only the semantic label shows (name vX.Y.Z); the expanded
      // block carries the content-addressed version hash — the real identity —
      // and the full parameter set.
      function methodologyLabel(m) {
        return m.display_version ? `${m.name} v${m.display_version}` : `${m.name} @ ${m.version}`;
      }

      function methodologyBody(container, m) {
        if (m.display_version) {
          const identity = document.createElement("div");
          identity.className = "param muted";
          identity.textContent = `version: ${m.version}`;
          container.appendChild(identity);
        }
        Object.entries(m.parameters || {}).forEach(([key, value]) => {
          const line = document.createElement("div");
          line.className = "param";
          line.textContent = `${key}: ${JSON.stringify(value)}`;
          container.appendChild(line);
        });
      }

      function methodologySection(runId, m) {
        const meth = document.createElement("details");
        meth.className = "methodology";
        meth.open = methodologyOpen[runId] === true;
        meth.addEventListener("toggle", () => {
          methodologyOpen[runId] = meth.open;
        });
        const summary = document.createElement("summary");
        summary.textContent = `methodology ${methodologyLabel(m)}`;
        meth.appendChild(summary);
        methodologyBody(meth, m);
        return meth;
      }

      // The provenance review list: every methodology version ever minted, its
      // full inputs, and how much work ran under it.
      async function loadMethodologies() {
        const versions = await (await fetch("/api/methodologies")).json();
        const container = document.getElementById("methodology-list");
        container.innerHTML = "";
        versions.forEach((m) => {
          const entry = document.createElement("details");
          entry.className = "methodology";
          const summary = document.createElement("summary");
          summary.textContent =
            `${methodologyLabel(m)} · ${m.run_count} run${m.run_count === 1 ? "" : "s"}`;
          entry.appendChild(summary);
          const dates = document.createElement("div");
          dates.className = "param muted";
          dates.textContent =
            `created ${fmtDate(m.created_at)}` +
            (m.last_run_at ? ` · last run ${fmtDate(m.last_run_at)}` : "");
          entry.appendChild(dates);
          methodologyBody(entry, m);
          container.appendChild(entry);
        });
      }

      function progressSection(progress) {
        const wrap = document.createElement("div");
        wrap.className = "run-progress";
        const pct = progress.batch_total
          ? Math.round((100 * progress.batch_index) / progress.batch_total)
          : 0;
        const label = document.createElement("div");
        label.className = "run-progress-label";
        const stage = document.createElement("strong");
        stage.textContent = `${progress.stage} exports`;
        label.appendChild(stage);
        label.appendChild(
          document.createTextNode(
            ` — batch ${progress.batch_index} of ${progress.batch_total} (${pct}%)`,
          ),
        );
        const track = document.createElement("div");
        track.className = "progress-track";
        const fill = document.createElement("div");
        fill.className = "progress-fill";
        fill.style.width = `${pct}%`;
        track.appendChild(fill);
        const counters = document.createElement("div");
        counters.className = "run-progress-counters muted";
        counters.textContent =
          `${progress.exports_completed} raster export${progress.exports_completed === 1 ? "" : "s"} completed` +
          (progress.batches_failed
            ? ` · ${progress.batches_failed} batch${progress.batches_failed === 1 ? "" : "es"} failed`
            : "");
        wrap.append(label, track, counters);
        return wrap;
      }

      async function loadRuns(aoiId) {
        const runs = await (await fetch(`/api/aois/${aoiId}/runs`)).json();
        if (aoiId !== currentAoiId) return; // a newer AOI selection won the race
        // Nothing changed since the last poll → leave the DOM alone. This keeps
        // the methodology toggle open, kills the 15 s rebuild flicker, and skips
        // the detail fetch. The stale flag is part of the key so a run crossing
        // the staleness threshold still re-renders.
        const renderKey =
          `${aoiId}:${runs.length ? runStatusLabel(runs[0]) : ""}:${JSON.stringify(runs)}`;
        if (renderKey === runsRenderKey) return;
        const container = document.getElementById("runs");
        if (!runs.length) {
          // Runs are recorded from the first pipeline run after this feature
          // landed; an explicit empty state beats a silently missing panel.
          container.innerHTML = "";
          const empty = document.createElement("div");
          empty.className = "run muted";
          empty.textContent =
            "No pipeline runs recorded yet — the next run (daily at 03:00 UTC, or started manually) will appear here live.";
          container.appendChild(empty);
          runsRenderKey = renderKey;
          return;
        }

        const latest = runs[0];
        const card = document.createElement("div");
        card.className = "run";
        card.innerHTML =
          `<strong>Pipeline run</strong> ` +
          `<span class="run-status-${latest.status}">${runStatusLabel(latest)}</span>` +
          `<div class="muted">started ${fmtDateTime(latest.started_at)} · ` +
          `window ${fmtDate(latest.since)} → ${fmtDate(latest.until)}</div>`;
        const detail = await (await fetch(`/api/runs/${latest.id}`)).json();
        if (aoiId !== currentAoiId) return;
        if (detail.methodology) card.appendChild(methodologySection(latest.id, detail.methodology));
        // The live view of a running run: overall position from the whole-run
        // progress aggregate, then the recent activity tail — the long Earth
        // Engine queue waits stay visible from the browser.
        if (latest.status === "running") {
          if (detail.progress) card.appendChild(progressSection(detail.progress));
          // All fetched events (server caps at RUN_EVENTS_LIMIT) in a scrollable
          // console (#150), pinned to the newest at the bottom.
          const events = collapseEvents(detail.events);
          if (events.length) {
            const eventsBox = document.createElement("div");
            eventsBox.className = "run-events";
            events.forEach((ev) => eventsBox.appendChild(eventLine(ev)));
            card.appendChild(eventsBox);
            // Scroll after insertion into the document below.
            requestAnimationFrame(() => (eventsBox.scrollTop = eventsBox.scrollHeight));
          }
        } else if (latest.summary) {
          const s = latest.summary;
          const line = document.createElement("div");
          line.className = "run-line";
          line.textContent =
            `${s.index_rasters} indices (${s.index_rasters_reused} reused) · ` +
            `${s.change_rasters} changes (${s.change_rasters_reused} reused) · ` +
            `${s.export_failures} export failures`;
          card.appendChild(line);
        }
        // Clear only now that the card is fully built: no blank flash while the
        // detail fetch is in flight.
        container.innerHTML = "";
        container.appendChild(card);

        runs.slice(1, 5).forEach((run) => {
          const line = document.createElement("div");
          line.className = "run-line muted";
          line.innerHTML =
            `${fmtDateTime(run.started_at)} · ` +
            `<span class="run-status-${run.status}">${runStatusLabel(run)}</span>`;
          container.appendChild(line);
        });
        runsRenderKey = renderKey;
        // A new run may have minted a new methodology version — keep the review
        // list's entries and run counts in step with the runs panel.
        loadMethodologies();
      }

      function opinionLabel(opinion) {
        return opinion === "false_positive" ? "false positive" : opinion;
      }

      function basisLabel(basis) {
        return (
          { "optical-only": "optical", "radar-only": "radar", both: "optical+radar" }[basis] ||
          basis
        );
      }

      function basisBadge(basis) {
        const badge = document.createElement("span");
        badge.className = `basis basis-${basis}`;
        badge.textContent = basisLabel(basis);
        return badge;
      }

      function popupHtml(p) {
        const conf = p.confidence_level
          ? ` <span class="conf conf-${p.confidence_level}">${p.confidence_level}</span>`
          : "";
        const basis = p.basis
          ? ` <span class="basis basis-${p.basis}">${basisLabel(p.basis)}</span>`
          : "";
        return (
          `<strong>Event #${p.id}</strong> ` +
          `<span class="status-${p.status}">${p.status}</span>${conf}${basis}`
        );
      }

      function opinionBadge(opinion) {
        const badge = document.createElement("span");
        badge.className = `opinion opinion-${opinion}`;
        badge.textContent = opinionLabel(opinion);
        return badge;
      }

      function renderEventList(features) {
        const container = document.getElementById("events");
        container.innerHTML = "";
        features.forEach((f) => {
          const p = f.properties;
          const div = document.createElement("div");
          div.className = "event";
          div.id = `event-${p.id}`;
          const coverage =
            p.latest_valid_fraction != null
              ? ` · latest ${fmtPct(p.latest_valid_fraction)} clear`
              : "";
          div.innerHTML =
            `<strong>Event #${p.id}</strong> ` +
            `<span class="status-${p.status}">${p.status}</span>` +
            `<div class="muted">first detected ${fmtDate(p.first_detected_at)} · ` +
            `footprint ${fmtArea(p.footprint_area_m2)} · ${p.observation_count} obs${coverage}</div>`;
          // The human opinion sits beside — never replaces — the automatic status.
          if (p.latest_opinion) {
            div.querySelector("strong").after(document.createTextNode(" "));
            div.children[1].after(opinionBadge(p.latest_opinion));
          }
          if (p.confidence_level) {
            const conf = document.createElement("span");
            conf.className = `conf conf-${p.confidence_level}`;
            conf.textContent = p.confidence_level;
            conf.title = p.confidence_score != null ? `score ${p.confidence_score}` : "";
            div.querySelector(".muted").before(conf);
          }
          // Detection basis (#119): optical / radar / optical+radar, from the
          // agreement classification. Absent until the first fused assessment.
          if (p.basis) div.querySelector(".muted").before(basisBadge(p.basis));
          div.onclick = () => showEvent(p.id);
          container.appendChild(div);
        });
      }

      // Context layers (E17/#127): muted overlays per kind, off by default.
      const KIND_COLORS = {
        concession: "#b8860b",
        protected_area: "#2e8b57",
        road: "#8b4513",
        river: "#4682b4",
        settlement: "#708090",
        mill: "#a0522d",
        port: "#5f9ea0",
        other: "#7f8c8d",
      };
      const contextOverlays = {}; // layer id -> Leaflet layer while toggled on

      async function loadContextLayers() {
        let layers;
        try {
          layers = await (await fetch("/api/context/layers")).json();
        } catch (e) {
          return;
        }
        const container = document.getElementById("context-layer-list");
        container.innerHTML = "";
        if (!layers.length) {
          container.textContent = "none loaded";
          return;
        }
        layers.forEach((layer) => {
          const label = document.createElement("label");
          label.className = "context-item";
          const box = document.createElement("input");
          box.type = "checkbox";
          box.checked = Boolean(contextOverlays[layer.id]);
          box.onchange = () => toggleContextLayer(layer, box.checked);
          label.appendChild(box);
          const swatch = document.createElement("span");
          swatch.className = "context-swatch";
          swatch.style.background = KIND_COLORS[layer.kind] || KIND_COLORS.other;
          label.appendChild(swatch);
          // Names are operator data — text nodes only, never HTML.
          label.appendChild(
            document.createTextNode(
              `${layer.name} (${layer.kind.replace("_", " ")}, ${layer.feature_count})`,
            ),
          );
          container.appendChild(label);
        });
      }

      async function toggleContextLayer(layer, on) {
        if (!on) {
          if (contextOverlays[layer.id]) {
            map.removeLayer(contextOverlays[layer.id]);
            delete contextOverlays[layer.id];
          }
          return;
        }
        const collection = await (
          await fetch(`/api/context/layers/${layer.id}/features`)
        ).json();
        const color = KIND_COLORS[layer.kind] || KIND_COLORS.other;
        contextOverlays[layer.id] = L.geoJSON(collection, {
          style: () => ({ color, weight: 1.5, dashArray: "4 3", fillOpacity: 0.06 }),
          pointToLayer: (f, latlng) =>
            L.circleMarker(latlng, { radius: 4, color, fillOpacity: 0.6 }),
        }).addTo(map);
      }

      // How the event relates to the loaded layers — recomputed per run, so
      // this is display only. Feature names are operator data: text nodes only.
      // Persistence trajectory (#165): the onset detector goes quiet once its
      // trailing baseline absorbs a clearing, so this answers "still bare,
      // regenerating, or one-look transient?" from the retained NBR COGs.
      // Fetched lazily per event; values are rendered as text/tooltips (DOM
      // APIs only), never innerHTML.
      const _SVG = "http://www.w3.org/2000/svg";

      function _svg(tag, attrs) {
        const el = document.createElementNS(_SVG, tag);
        Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, String(value)));
        return el;
      }

      function trajectorySparkline(data) {
        const width = 300;
        const height = 56;
        const pad = { left: 6, right: 6, top: 8, bottom: 8 };
        // Draw only what is drawable; a malformed point must not blank the chart.
        const points = (data.points || []).filter(
          (p) => Number.isFinite(p.mean_nbr) && Number.isFinite(Date.parse(p.date)),
        );
        if (!points.length) throw new Error("no drawable points");
        const values = points.map((p) => p.mean_nbr);
        if (data.reference_nbr != null) values.push(data.reference_nbr);
        const lo = Math.min(...values);
        const hi = Math.max(...values);
        const span = hi - lo || 1;
        const t0 = Date.parse(points[0].date);
        const t1 = Date.parse(points[points.length - 1].date) || t0 + 1;
        const x = (date) =>
          pad.left +
          ((Date.parse(date) - t0) / (t1 - t0 || 1)) * (width - pad.left - pad.right);
        const y = (v) => pad.top + (1 - (v - lo) / span) * (height - pad.top - pad.bottom);

        const svg = _svg("svg", {
          viewBox: `0 0 ${width} ${height}`,
          class: "trajectory-svg",
          role: "img",
          "aria-label": "Footprint mean NBR over time",
        });
        if (data.reference_nbr != null) {
          // Pre-event reference: the level a full recovery returns to.
          svg.appendChild(
            _svg("line", {
              x1: pad.left, x2: width - pad.right,
              y1: y(data.reference_nbr), y2: y(data.reference_nbr),
              stroke: "#95a5a6", "stroke-width": 1, "stroke-dasharray": "4 3",
            }),
          );
        }
        const line = _svg("polyline", {
          points: points.map((p) => `${x(p.date)},${y(p.mean_nbr)}`).join(" "),
          fill: "none", stroke: "#2980b9", "stroke-width": 2,
          "stroke-linejoin": "round", "stroke-linecap": "round",
        });
        svg.appendChild(line);
        points.forEach((p, i) => {
          const dot = _svg("circle", {
            cx: x(p.date), cy: y(p.mean_nbr), r: i === 0 ? 3.5 : 2.5,
            fill: i === 0 ? "#c0392b" : "#2980b9",
          });
          const title = document.createElementNS(_SVG, "title");
          title.textContent =
            `${p.date}: mean NBR ${p.mean_nbr.toFixed(3)} · ` +
            `${Math.round(p.valid_fraction * 100)}% of footprint observed` +
            (i === 0 ? " (detection)" : "");
          dot.appendChild(title);
          svg.appendChild(dot);
        });
        return svg;
      }

      async function renderTrajectory(eventId, container) {
        let data;
        try {
          data = await (await fetch(`/api/events/${eventId}/trajectory`)).json();
        } catch (e) {
          return; // advisory panel — an unreachable endpoint renders nothing
        }
        const heading = document.createElement("div");
        heading.className = "timeline";
        const label = document.createElement("em");
        label.textContent = "Persistence:";
        heading.appendChild(label);
        container.appendChild(heading);
        if (data.state === "insufficient-data" || !data.points.length) {
          const note = document.createElement("div");
          note.className = "muted trajectory-note";
          note.textContent =
            "insufficient data — no clear post-detection looks with retained NBR rasters";
          container.appendChild(note);
          return;
        }
        const pill = document.createElement("span");
        pill.className = `persistence-state state-${data.state}`;
        pill.textContent = data.state;
        heading.appendChild(pill);
        // The state pill must never be orphaned by a chart bug: a payload the
        // sparkline can't draw renders a visible diagnostic, not silence.
        try {
          container.appendChild(trajectorySparkline(data));
          const caption = document.createElement("div");
          caption.className = "muted trajectory-note";
          const latest = data.points[data.points.length - 1];
          caption.textContent =
            `footprint mean NBR · pre-event ${
              data.reference_nbr != null ? data.reference_nbr.toFixed(2) : "?"
            } · latest ${latest.mean_nbr.toFixed(2)} (${latest.date})`;
          container.appendChild(caption);
        } catch (err) {
          const note = document.createElement("div");
          note.className = "muted trajectory-note";
          note.textContent = `sparkline unavailable (${err && err.message ? err.message : err})`;
          container.appendChild(note);
        }
      }

      function contextSection(detail) {
        const wrap = document.createElement("div");
        const heading = document.createElement("div");
        heading.className = "timeline";
        heading.innerHTML = "<em>Context:</em>";
        wrap.appendChild(heading);
        if (!detail.context.length) {
          const none = document.createElement("div");
          none.className = "conf-explain muted";
          none.textContent = "no context relations (load layers, then run the pipeline)";
          wrap.appendChild(none);
          return wrap;
        }
        detail.context.forEach((rel) => {
          const line = document.createElement("div");
          line.className = "conf-explain";
          const target = `${rel.kind.replace("_", " ")} ${rel.name || rel.layer}`;
          line.textContent =
            rel.relation === "contains"
              ? `inside ${target}`
              : rel.relation === "intersects"
                ? `overlaps ${target}`
                : `${fmtDistance(rel.distance_m)} from ${target}`;
          wrap.appendChild(line);
        });
        return wrap;
      }

      // Sensor attribution (#119, README questions 7-8): which method produced
      // the detection and whether the other lineage agrees — display only,
      // read from the lineage's methodology and the recorded assessment inputs.
      function detectionSection(detail) {
        const wrap = document.createElement("div");
        const heading = document.createElement("div");
        heading.className = "timeline";
        heading.innerHTML = "<em>Detection:</em>";
        wrap.appendChild(heading);
        const line = document.createElement("div");
        line.className = "conf-explain";
        if (detail.basis) {
          line.appendChild(basisBadge(detail.basis));
          line.appendChild(document.createTextNode(" "));
        }
        const method = detail.methodology
          ? `method ${detail.methodology.name} v${detail.methodology.display_version}`
          : "method unknown";
        line.appendChild(
          document.createTextNode(detail.basis ? method : `basis not yet assessed · ${method}`),
        );
        wrap.appendChild(line);
        const factors = detail.confidence.length
          ? detail.confidence[0].inputs.factors || {}
          : {};
        const agreement = factors.agreement || {};
        if (detail.basis === "both" && (agreement.matching_candidate_ids || []).length) {
          const ids = agreement.matching_candidate_ids.map((id) => `#${id}`).join(", ");
          const agree = document.createElement("div");
          agree.className = "conf-explain";
          agree.textContent =
            `agreeing ${agreement.other_kind || "other-lineage"} candidates: ${ids} ` +
            `(within ±${agreement.window_days} days)`;
          wrap.appendChild(agree);
        }
        return wrap;
      }

      // The explained "why" of the latest assessment: rendered entirely from
      // the recorded inputs — nothing is recomputed client-side.
      function confidenceSection(detail) {
        const wrap = document.createElement("div");
        const heading = document.createElement("div");
        heading.className = "timeline";
        heading.innerHTML = "<em>Confidence:</em>";
        wrap.appendChild(heading);
        if (!detail.confidence.length) {
          const none = document.createElement("div");
          none.className = "conf-explain muted";
          none.textContent = "not yet assessed (runs after the next pipeline run)";
          wrap.appendChild(none);
          return wrap;
        }
        const latest = detail.confidence[0];
        const summary = document.createElement("div");
        summary.className = "conf-explain";
        const badge = document.createElement("span");
        badge.className = `conf conf-${latest.level}`;
        badge.textContent = latest.level;
        summary.appendChild(badge);
        summary.appendChild(
          document.createTextNode(
            ` score ${latest.score} · rule ${latest.rule_version} · ${fmtDate(latest.created_at)}`,
          ),
        );
        wrap.appendChild(summary);
        const weights = latest.inputs.weights || {};
        const subscores = latest.inputs.subscores || {};
        const factors = latest.inputs.factors || {};
        Object.keys(weights).forEach((name) => {
          const line = document.createElement("div");
          line.className = "conf-explain";
          const subscore = subscores[name];
          const raw = Object.entries(factors[name] || {})
            .filter(([, value]) => value != null)
            .map(([key, value]) => `${key} ${value}`)
            .join(", ");
          line.textContent =
            subscore == null
              ? `${name}: unavailable (weight redistributed)`
              : `${name}: ${subscore.toFixed(2)} × weight ${weights[name]}` +
                (raw ? ` (${raw})` : "");
          wrap.appendChild(line);
        });
        detail.confidence.slice(1).forEach((entry) => {
          const line = document.createElement("div");
          line.className = "conf-history";
          line.textContent =
            `${fmtDate(entry.created_at)}: ${entry.level} (${entry.score}, ${entry.rule_version})`;
          wrap.appendChild(line);
        });
        return wrap;
      }

      // Review section built with DOM APIs: notes/reviewer are free text from
      // humans and must never be injected as HTML.
      function reviewSection(detail) {
        const wrap = document.createElement("div");
        // Buttons and inputs live inside the card, whose click handler reloads
        // the detail — don't let form interaction re-trigger it.
        wrap.addEventListener("click", (e) => e.stopPropagation());
        const heading = document.createElement("div");
        heading.className = "timeline";
        heading.innerHTML = "<em>Review:</em>";
        wrap.appendChild(heading);

        detail.reviews.forEach((review) => {
          const entry = document.createElement("div");
          entry.className = "review-entry";
          entry.appendChild(document.createTextNode(`${fmtDate(review.created_at)} `));
          entry.appendChild(opinionBadge(review.opinion));
          const tail = [review.reviewer, review.notes].filter(Boolean).join(" — ");
          if (tail) entry.appendChild(document.createTextNode(` ${tail}`));
          wrap.appendChild(entry);
        });
        if (!detail.reviews.length) {
          const none = document.createElement("div");
          none.className = "review-entry muted";
          none.textContent = "not yet reviewed";
          wrap.appendChild(none);
        }

        const form = document.createElement("div");
        form.className = "review-form";
        const notes = document.createElement("input");
        notes.placeholder = "notes (optional)";
        const reviewer = document.createElement("input");
        reviewer.placeholder = "your name (optional)";
        ["confirmed", "false_positive", "uncertain", "resolved"].forEach((opinion) => {
          const button = document.createElement("button");
          button.textContent = opinionLabel(opinion);
          button.onclick = () => postReview(detail.id, opinion, notes.value, reviewer.value);
          form.appendChild(button);
        });
        form.appendChild(notes);
        form.appendChild(reviewer);
        wrap.appendChild(form);
        return wrap;
      }

      async function postReview(eventId, opinion, notes, reviewer) {
        const response = await fetch(`/api/events/${eventId}/reviews`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ opinion, notes: notes || null, reviewer: reviewer || null }),
        });
        if (!response.ok) {
          const body = await response.json().catch(() => ({}));
          window.alert(body.detail || `Review failed (${response.status}).`);
          return;
        }
        // Refresh the list (badge + filters see the new opinion), then reopen.
        await loadEvents(currentAoiId);
        showEvent(eventId);
      }

      async function showEvent(eventId) {
        document
          .querySelectorAll(".event")
          .forEach((el) => el.classList.remove("selected"));
        const card = document.getElementById(`event-${eventId}`);
        if (card) card.classList.add("selected");
        if (layersById[eventId]) map.fitBounds(layersById[eventId].getBounds(), { maxZoom: 14 });
        jumpGibsToDate(eventFirstDetectedById[eventId]);

        const detail = await (await fetch(`/api/events/${eventId}`)).json();
        const rows = detail.timeline
          .map(
            (m) =>
              `<div class="timeline">${fmtDate(m.observed_at)}: detected ${fmtArea(m.area_m2)}` +
              (m.growth_m2 != null ? ` (footprint +${fmtArea(m.growth_m2)})` : "") +
              // Quality metadata (#95/E14): how clear the look was and how deep
              // the drop — distinguishes strong evidence from obscured scenes.
              `<span class="muted">${qualityNote(m)}</span>` +
              `</div>`,
          )
          .join("");
        const evidence = detail.evidence
          .map(
            (e) =>
              `<div class="evidence">${e.change_type}` +
              (e.valid_pixel_fraction != null ? ` (${fmtPct(e.valid_pixel_fraction)} clear)` : "") +
              `: ${e.cog_path}</div>`,
          )
          .join("");
        const card2 = document.getElementById(`event-${eventId}`);
        if (card2) {
          card2.querySelectorAll(".detail").forEach((el) => el.remove());
          const detailDiv = document.createElement("div");
          detailDiv.className = "detail";
          detailDiv.innerHTML =
            `<div class="timeline"><em>Timeline (expansion):</em></div>${rows}` +
            `<div class="timeline"><em>Evidence:</em></div>${evidence}`;
          detailDiv.prepend(detectionSection(detail));
          const trajectoryBox = document.createElement("div");
          detailDiv.appendChild(trajectoryBox);
          renderTrajectory(eventId, trajectoryBox); // async fill (#165)
          detailDiv.appendChild(contextSection(detail));
          detailDiv.appendChild(confidenceSection(detail));
          detailDiv.appendChild(reviewSection(detail));
          card2.appendChild(detailDiv);
        }
      }

      function fmtDate(iso) {
        return iso ? iso.slice(0, 10) : "—";
      }
      function fmtDateTime(iso) {
        return iso ? iso.slice(0, 16).replace("T", " ") : "—";
      }
      function fmtTime(iso) {
        return iso ? iso.slice(11, 16) : "—";
      }
      function fmtPct(fraction) {
        return `${Math.round(fraction * 100)}%`;
      }
      function fmtDistance(meters) {
        if (meters == null) return "—";
        return meters >= 1000 ? `${(meters / 1000).toFixed(1)} km` : `${Math.round(meters)} m`;
      }
      function qualityNote(m) {
        const parts = [];
        if (m.valid_pixel_fraction != null) parts.push(`${fmtPct(m.valid_pixel_fraction)} clear`);
        if (m.delta_min != null) parts.push(`ΔNBR min ${m.delta_min.toFixed(2)}`);
        if (m.delta_mean != null) parts.push(`mean ${m.delta_mean.toFixed(2)}`);
        return parts.length ? ` · ${parts.join(" · ")}` : "";
      }
      function fmtArea(m2) {
        return m2 == null ? "—" : `${(m2 / 10000).toFixed(2)} ha`;
      }

      // The live settings catalogue (Slice 7 bead 7.1): the four config-inventory
      // categories, each value's resolved state, and the implications of changing
      // it. Values are operator data — built with DOM APIs, never innerHTML.
      const SETTINGS_CATEGORY_LABELS = {
        instance: "Instance",
        "pipeline-tuning": "Pipeline tuning",
        methodology: "Methodology",
        lifecycle: "Lifecycle & interpretation",
      };
      async function loadSettings() {

      function settingRow(setting) {
        const row = document.createElement("div");
        row.className = "setting";
        const head = document.createElement("div");
        const name = document.createElement("code");
        name.textContent = setting.key;
        head.appendChild(name);
        const value = document.createElement("span");
        value.className = "setting-value";
        value.textContent =
          setting.resolved == null ? "(unset)" : ` ${setting.resolved}`;
        head.appendChild(value);
        const source = document.createElement("span");
        source.className = "muted";
        source.textContent =
          ` · ${setting.source}` +
          (setting.editability === "display-only" ? " · read-only" : "");
        head.appendChild(source);
        row.appendChild(head);
        const purpose = document.createElement("div");
        purpose.className = "param muted";
        purpose.textContent = setting.purpose;
        row.appendChild(purpose);
        const implications = document.createElement("div");
        implications.className = "param muted";
        implications.textContent = setting.implications;
        row.appendChild(implications);
        if (setting.recorded !== undefined && setting.recorded !== null) {
          const recorded = document.createElement("div");
          recorded.className = "param muted";
          recorded.textContent = `current methodology recorded: ${setting.recorded}`;
          row.appendChild(recorded);
        }
        if (setting.editability !== "display-only") {
          row.appendChild(settingEditor(setting));
        }
        return row;
      }

      // Bead 7.2: the edit affordance — hidden entirely when the settings-edit
      // capability is off (world-open dashboard); the API guard is the backstop.
      function settingEditor(setting) {
        const form = document.createElement("div");
        form.className = "setting-edit";
        let input;
        if (setting.choices && setting.choices.length) {
          input = document.createElement("select");
          setting.choices.forEach((choice) => {
            const option = document.createElement("option");
            option.value = choice;
            option.textContent = choice;
            if (choice === setting.resolved) option.selected = true;
            input.appendChild(option);
          });
        } else {
          input = document.createElement("input");
          input.type = "text";
          input.value = setting.resolved == null ? "" : setting.resolved;
        }
        const save = document.createElement("button");
        save.textContent = "Save";
        const status = document.createElement("span");
        status.className = "muted";
        save.addEventListener("click", async () => {
          const payload = { key: setting.key, value: input.value };
          if (setting.editability === "guarded") {
            // The consequence copy is the contract: agreeing here sends the
            // explicit confirmation flag the API requires.
            if (!window.confirm(`${setting.key}: ${setting.implications}\n\nProceed?`)) {
              return;
            }
            payload.confirm_methodology_change = true;
          }
          save.disabled = true;
          status.textContent = "Saving…";
          try {
            const response = await fetch("/api/settings", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(payload),
            });
            const body = await response.json().catch(() => ({}));
            if (!response.ok) {
              status.textContent = body.detail || `Failed (${response.status}).`;
              return;
            }
            status.textContent = `Saved (was ${body.old ?? "unset"}) — ${body.detail}`;
          } catch (e) {
            status.textContent = "Failed to save.";
          } finally {
            save.disabled = false;
          }
        });
        form.appendChild(input);
        form.appendChild(save);
        form.appendChild(status);
        return form;
      }

      // Reviews are disabled on a world-open dashboard; hide the form entirely.
      async function loadCapabilities() {
        try {
          const caps = await (await fetch("/api/capabilities")).json();
          document.body.classList.toggle("aoi-uploads-disabled", !caps.aoi_uploads);
          document.body.classList.toggle("pipeline-trigger-disabled", !caps.pipeline_trigger);
          document.body.classList.toggle("reviews-disabled", !caps.reviews);
          document.body.classList.toggle("context-uploads-disabled", !caps.context_uploads);
          document.body.classList.toggle("settings-edit-disabled", !caps.settings_edit);
        } catch (e) {
          /* leave the default (enabled) — the API guard is the backstop */
        }
      }

      document.getElementById("run-now").addEventListener("click", runPipelineNow);
      document.getElementById("assess-now").addEventListener("click", runAssessNow);
      document.getElementById("stop-run").addEventListener("click", stopPipelineRun);
      document.getElementById("filter-status").addEventListener("change", renderEvents);
      document.getElementById("filter-opinion").addEventListener("change", renderEvents);
      document.getElementById("filter-confidence").addEventListener("change", renderEvents);
      document.getElementById("filter-basis").addEventListener("change", renderEvents);
      document.getElementById("aoi-upload").addEventListener("click", uploadAoi);
      document.getElementById("context-upload").addEventListener("click", uploadContextLayer);
      // Settings slide-out (#151): refresh the catalogue on every open so the
      // values shown are current, not boot-time.
      function setSettingsVisible(visible) {
        document.body.classList.toggle("settings-visible", visible);
        document.getElementById("settings-panel").setAttribute("aria-hidden", String(!visible));
        if (visible) loadSettings();
      }
      document.getElementById("settings-open").addEventListener("click", () =>
        setSettingsVisible(true),
      );
      document.getElementById("settings-close").addEventListener("click", () =>
        setSettingsVisible(false),
      );
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") setSettingsVisible(false);
      });
      document.getElementById("aoi-toggle").addEventListener("click", toggleAoiEnabled);
      document.getElementById("aoi-select").addEventListener("change", (e) => {
        updateAoiToggle();
        loadEvents(e.target.value);
      });
      // Only the runs panel refreshes itself: it is the live view of an executing
      // run, while events/map stay event-driven off the selector and clicks.
      setInterval(() => {
        if (currentAoiId != null) loadRuns(currentAoiId);
      }, 15000);
      loadAois();
      loadMethodologies();
      loadContextLayers();
      // Settings load on slide-out open (#151), not at boot.
      loadCapabilities();
    </script>
  </body>
</html>
