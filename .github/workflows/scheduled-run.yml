# Scheduled pipeline run — the intended-direction scheduler for Slice 3 / epic E11
# (see docs/work-plan.md). It triggers the optical-change pipeline on the GCE VM
# over a rolling window. Disabled by default: it only runs once the listed repo
# secrets are configured, and you opt in by uncommenting the `schedule` trigger.
#
# This is the GitHub-Actions-cron path from docs/architecture.md. The VM owns the
# Earth Engine credentials and the COG store; this workflow just kicks the run via
# SSH, so the only secret in CI is the GCP service-account credential (GCP_SA_KEY,
# which gcloud uses to mint ephemeral SSH access).
#
# Required repository secrets:
#   GCP_PROJECT       GCP project id
#   GCE_INSTANCE      VM name (e.g. forest-sentinel-vm)
#   GCE_ZONE          VM zone (e.g. us-west1-a)
#   GCP_SA_KEY        service-account key JSON (for `gcloud` auth in CI)

name: Scheduled pipeline run

on:
  workflow_dispatch:
  # Uncomment to enable the cron schedule (daily at 03:00 UTC):
  # schedule:
  #   - cron: "0 3 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    # Remove this guard once the secrets above are configured.
    if: ${{ false }}
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger the pipeline run on the VM
        run: |
          gcloud compute ssh "${{ secrets.GCE_INSTANCE }}" \
            --project "${{ secrets.GCP_PROJECT }}" \
            --zone "${{ secrets.GCE_ZONE }}" \
            --command "sudo systemctl start forest-sentinel-pipeline.service"
