name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: forest_sentinel
          POSTGRES_PASSWORD: forest_sentinel
          POSTGRES_DB: forest_sentinel
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U forest_sentinel"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      FOREST_SENTINEL_DATABASE_URL: postgresql+psycopg://forest_sentinel:forest_sentinel@localhost:5432/forest_sentinel

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest
