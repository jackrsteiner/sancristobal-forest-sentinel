# Update a running Open Forest Sentinel instance from the Actions tab — no local
# git commands, no SSHing into the VM. Three independent toggles (all on by default):
#
#   sync_upstream  merge the template's latest main into this repo's main and push
#                  (the automated form of `git pull --no-rebase upstream main && git push`)
#   sync_aois      copy dashboard-uploaded AOI GeoJSONs (config/aois/ on the VM) back
#                  into this repo and commit them — the VM holds no GitHub credentials
#                  for repo contents (keyless posture), so this job is what makes
#                  uploads durable
#   sync_settings  copy dashboard settings edits (config/overrides.env on the VM)
#                  back into this repo and commit them (Slice 7 bead 7.3)
#   update_vm      SSH to the VM via Workload Identity Federation and re-run
#                  scripts/vm_setup.sh (idempotent: pulls the repo, regenerates .env,
#                  applies migrations, re-renders systemd units, restarts the dashboard)
#
# Ordering: the sync jobs push before update_vm pulls, so the VM's untracked upload
# becomes a tracked file (git allows the checkout because the content is identical).
#
# Near-real-time syncs (bead 7.3, #136): the dashboard fires this workflow via
# workflow_dispatch after a settings edit or upload, using a fine-grained PAT
# scoped to Actions only — the VM still never holds a contents-write credential.
# Untick sync_upstream to only refresh the VM (e.g. after editing config/instance.env);
# untick update_vm to only bring the repo up to date with the template.
#
# The merge push may touch .github/workflows/, which the default GITHUB_TOKEN cannot
# write — the OFS_ADMIN_TOKEN secret (same fine-grained PAT as the deploy graft) is
# used when present. A merge conflict fails the run with instructions to resolve
# locally; nothing is pushed in that case.

name: Update instance

on:
  workflow_dispatch:
    inputs:
      sync_upstream:
        description: "Merge template updates (upstream main) into this repo and push"
        type: boolean
        default: true
      sync_aois:
        description: "Commit dashboard-uploaded AOIs from the VM to this repo"
        type: boolean
        default: true
      sync_settings:
        description: "Commit dashboard settings edits (config/overrides.env) from the VM"
        type: boolean
        default: true
      update_vm:
        description: "Pull + re-run vm_setup.sh on the VM"
        type: boolean
        default: true

permissions:
  id-token: write   # OIDC token for Workload Identity Federation
  contents: write   # push the upstream merge

env:
  BASE_REPO: jackrsteiner/open-forest-sentinel

jobs:
  sync:
    name: Sync template updates
    runs-on: ubuntu-latest
    if: ${{ inputs.sync_upstream }}
    steps:
      - name: Check out instance repo (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # The default GITHUB_TOKEN cannot push commits that touch
          # .github/workflows/, which upstream template updates may include.
          token: ${{ secrets.OFS_ADMIN_TOKEN || github.token }}

      - name: Merge upstream main and push
        run: |
          if [ "$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')" = "$BASE_REPO" ]; then
            echo "This is the template repo itself — nothing to sync. Skipping."
            exit 0
          fi
          git remote add upstream "https://github.com/${BASE_REPO}.git"
          git fetch upstream main
          if ! git merge-base HEAD upstream/main >/dev/null 2>&1; then
            echo "::error::This repo does not share history with the template. Run the 'Deploy instance' workflow once first (it grafts the template history so updates can be merged)."
            exit 1
          fi
          behind="$(git rev-list --count HEAD..upstream/main)"
          if [ "$behind" -eq 0 ]; then
            echo "Already up to date with upstream — nothing to merge." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git merge --no-edit upstream/main; then
            {
              echo "## Merge conflict with upstream"
              echo ""
              echo "Conflicting files:"
              echo ""
              echo '```'
              git diff --name-only --diff-filter=U
              echo '```'
              echo ""
              echo "Resolve locally, then re-run this workflow (or update the VM manually):"
              echo ""
              echo '```'
              echo "git remote add upstream https://github.com/${BASE_REPO}.git"
              echo "git pull --no-rebase upstream main   # resolve conflicts, commit"
              echo "git push"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Merge conflict with upstream/main — nothing was pushed. See the run summary for the conflicting files and the local-resolution commands."
            git merge --abort
            exit 1
          fi
          git push origin main
          echo "Merged ${behind} new commit(s) from upstream and pushed to main." | tee -a "$GITHUB_STEP_SUMMARY"

  sync-aois:
    name: Commit uploaded AOIs from the VM
    runs-on: ubuntu-latest
    needs: sync
    if: ${{ !cancelled() && !failure() && inputs.sync_aois }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # AOI GeoJSONs are not workflow files, so the default token can push
          # them; the PAT fallback just keeps the checkout pattern uniform.
          token: ${{ secrets.OFS_ADMIN_TOKEN || github.token }}

      - name: Load instance config
        run: |
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' config/instance.env >> "$GITHUB_ENV"
          # shellcheck disable=SC1091
          . config/instance.env
          if [ -z "${PROJECT_ID:-}" ]; then
            echo "::error::Set PROJECT_ID in config/instance.env and commit it."
            exit 1
          fi

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.PROVISIONER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Harvest, commit, and push uploaded AOIs
        run: |
          mkdir -p config/aois
          # No uploads (or no directory yet) is a clean no-op — scp's failure is
          # expected then, and `git diff --cached` decides whether to commit.
          # The glob also harvests *.geojson.disabled markers (#149).
          gcloud compute scp \
            --zone "${ZONE:-us-west1-a}" \
            "${INSTANCE_NAME:-forest-sentinel-vm}:/home/ofs/open-forest-sentinel/config/aois/*.geojson*" \
            config/aois/ 2>/dev/null || true
          # Disabled markers are state, not uploads: re-enabling an AOI deletes
          # its marker on the VM, and scp never deletes — mirror the VM's
          # marker set so the repo can't resurrect a re-enabled AOI's marker
          # on the next redeploy (#149).
          vm_markers="$(gcloud compute ssh \
            --zone "${ZONE:-us-west1-a}" \
            "${INSTANCE_NAME:-forest-sentinel-vm}" \
            --command 'ls /home/ofs/open-forest-sentinel/config/aois/*.geojson.disabled 2>/dev/null | xargs -rn1 basename' \
            2>/dev/null || true)"
          for marker in config/aois/*.geojson.disabled; do
            [ -e "$marker" ] || continue
            case "$vm_markers" in
              *"$(basename "$marker")"*) ;;
              *) rm -f "$marker" ;;
            esac
          done
          git add -A config/aois
          if git diff --cached --quiet; then
            echo "No uploaded AOIs to commit." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Commit dashboard-uploaded AOIs from the VM"
          git push origin main
          {
            echo "## Uploaded AOIs committed"
            echo ""
            echo '```'
            git show --stat --format= HEAD
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  sync-settings:
    name: Commit settings edits from the VM
    runs-on: ubuntu-latest
    # Chained after sync-aois (not parallel): both jobs push to main, and
    # concurrent pushes would race to a non-fast-forward failure.
    needs: [sync, sync-aois]
    if: ${{ !cancelled() && !failure() && inputs.sync_settings }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # overrides.env is not a workflow file, so the default token can push
          # it; the PAT fallback just keeps the checkout pattern uniform.
          token: ${{ secrets.OFS_ADMIN_TOKEN || github.token }}

      - name: Load instance config
        run: |
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' config/instance.env >> "$GITHUB_ENV"
          # shellcheck disable=SC1091
          . config/instance.env
          if [ -z "${PROJECT_ID:-}" ]; then
            echo "::error::Set PROJECT_ID in config/instance.env and commit it."
            exit 1
          fi

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.PROVISIONER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Harvest, commit, and push settings edits
        run: |
          # No overrides file yet is a clean no-op — scp's failure is expected
          # then, and `git diff --cached` decides whether to commit.
          gcloud compute scp \
            --zone "${ZONE:-us-west1-a}" \
            "${INSTANCE_NAME:-forest-sentinel-vm}:/home/ofs/open-forest-sentinel/config/overrides.env" \
            config/overrides.env 2>/dev/null || true
          git add config/overrides.env
          if git diff --cached --quiet; then
            echo "No settings edits to commit." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Commit dashboard settings edits from the VM"
          git push origin main
          {
            echo "## Settings edits committed"
            echo ""
            echo '```'
            git show --format= HEAD -- config/overrides.env | head -40
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  update-vm:
    name: Update the VM
    runs-on: ubuntu-latest
    needs: [sync, sync-aois, sync-settings]
    # Run when the earlier jobs succeeded OR were skipped (toggle off), but not
    # when one failed — never roll a half-merged repo onto the VM.
    if: ${{ !cancelled() && !failure() && inputs.update_vm }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Load instance config
        run: |
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' config/instance.env >> "$GITHUB_ENV"
          # shellcheck disable=SC1091
          . config/instance.env
          if [ -z "${PROJECT_ID:-}" ]; then
            echo "::error::Set PROJECT_ID in config/instance.env and commit it."
            exit 1
          fi

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.PROVISIONER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Update the checkout and re-run vm_setup.sh on the VM
        run: |
          # Update FIRST, then invoke the fresh script: bash reads scripts
          # incrementally, so re-running a vm_setup.sh that an update rewrites
          # mid-execution would be unsafe. `reset --hard` (not pull): after the
          # sync-aois job commits an upload, the VM holds an identical UNTRACKED
          # copy, which a plain pull refuses to overwrite even byte-for-byte;
          # reset adopts it as tracked, while untracked files absent from the
          # incoming tree (not-yet-harvested uploads) survive. The VM checkout
          # is a deploy artifact — it never carries local commits worth keeping.
          # vm_setup.sh is idempotent and never touches a running pipeline —
          # it applies migrations (additive) and restarts only the dashboard.
          gcloud compute ssh "${INSTANCE_NAME:-forest-sentinel-vm}" \
            --project "${PROJECT_ID}" \
            --zone "${ZONE:-us-west1-a}" \
            --command "sudo -u ofs -H bash -c 'set -euo pipefail; cd /home/ofs/open-forest-sentinel && git fetch origin main && git checkout main && git reset --hard origin/main && bash scripts/vm_setup.sh'"

      - name: Write summary
        run: |
          INSTANCE_NAME="${INSTANCE_NAME:-forest-sentinel-vm}"
          ZONE="${ZONE:-us-west1-a}"
          PORT="${DASHBOARD_PORT:-8000}"
          {
            echo "## Instance updated"
            echo ""
            echo "The VM pulled the latest main and re-ran vm_setup.sh (migrations applied,"
            echo "dashboard restarted; a running pipeline is left untouched)."
            echo ""
            echo "Open an SSH tunnel to the dashboard:"
            echo ""
            echo '```'
            echo "gcloud compute ssh ${INSTANCE_NAME} --project ${PROJECT_ID} --zone ${ZONE} -- -L ${PORT}:localhost:${PORT}"
            echo '```'
            echo ""
            echo "then browse to http://localhost:${PORT}"
          } >> "$GITHUB_STEP_SUMMARY"
