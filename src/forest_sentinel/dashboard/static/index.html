<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open Forest Sentinel</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, sans-serif; display: flex; height: 100vh; }
      #sidebar { width: 360px; padding: 16px; overflow-y: auto; border-right: 1px solid #ddd; }
      #map { flex: 1; }
      h1 { font-size: 18px; margin: 0 0 12px; }
      h2 { font-size: 14px; margin: 16px 0 6px; }
      #add-aoi input[type="file"] { max-width: 100%; font-size: 12px; }
      .upload-error { color: #c0392b; }
      #pipeline-controls { margin: 12px 0 4px; }
      #run-now-status { font-size: 12px; margin-left: 6px; }
      select, button { font: inherit; padding: 6px; }
      .event { border: 1px solid #ddd; border-radius: 6px; padding: 8px; margin: 8px 0; cursor: pointer; }
      .event.selected { border-color: #c0392b; }
      .status-new { color: #2980b9; }
      .status-ongoing { color: #c0392b; }
      .timeline { font-size: 13px; margin: 6px 0; }
      .evidence { font-size: 12px; color: #555; }
      .muted { color: #888; }
      #runs { margin: 12px 0; }
      .run { border: 1px solid #ddd; border-radius: 6px; padding: 8px; margin: 8px 0; font-size: 13px; }
      .run-line { font-size: 12px; color: #555; margin: 2px 0; }
      .run-status-running { color: #2980b9; }
      .run-status-succeeded { color: #27ae60; }
      .run-status-partial { color: #e67e22; }
      .run-status-failed, .run-status-interrupted { color: #c0392b; }
      .methodology {
        margin: 8px 0; padding: 4px 8px; font-size: 12px; color: #555;
        border-left: 3px solid #ccc; background: #f6f6f6; border-radius: 0 4px 4px 0;
      }
      .methodology summary { cursor: pointer; }
      .methodology .param { margin: 2px 0 2px 14px; overflow-wrap: anywhere; }
      .run-progress { margin: 10px 0 6px; font-variant-numeric: tabular-nums; }
      .run-progress-label { margin-bottom: 4px; }
      .progress-track { height: 6px; background: #e4e4e4; border-radius: 3px; overflow: hidden; }
      .progress-fill { height: 100%; background: #2980b9; transition: width 0.5s; }
      .run-progress-counters { font-size: 12px; margin-top: 4px; }
      .run-events { margin-top: 8px; border-top: 1px solid #eee; padding-top: 4px; }
      /* Hanging indent: a wrapped event reads as one entry, not garbled lines. */
      .run-event {
        font-size: 12px; color: #555; margin: 4px 0; padding-left: 14px; text-indent: -14px;
        font-variant-numeric: tabular-nums;
      }
      .run-event-failed { color: #c0392b; }
      .run-event-warning { color: #e67e22; }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h1>Open Forest Sentinel</h1>
      <label>AOI: <select id="aoi-select"></select></label>
      <div id="summary" class="muted"></div>
      <div id="pipeline-controls">
        <button id="run-now">Run pipeline now</button>
        <span id="run-now-status" class="muted"></span>
      </div>
      <div id="runs"></div>
      <div id="events"></div>
      <div id="add-aoi">
        <h2>Add AOI</h2>
        <input type="file" id="aoi-file" accept=".geojson,.json" />
        <button id="aoi-upload">Upload</button>
        <div id="aoi-upload-status" class="muted"></div>
      </div>
    </div>
    <div id="map"></div>
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      const map = L.map("map").setView([0, 0], 2);
      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "&copy; OpenStreetMap contributors",
        maxZoom: 19,
      }).addTo(map);

      let eventsLayer = null;
      const layersById = {};
      const aoiBboxById = {};
      let currentAoiId = null;
      // A "running" run whose last progress event is older than this is likely dead
      // (SIGKILL / systemd timeout before the next run flips it to "interrupted").
      const STALE_RUN_MS = 2 * 60 * 60 * 1000;
      // Runs-panel render state: skip identical re-renders across polls, and
      // remember the methodology toggle (per run id) across the ones that happen.
      let runsRenderKey = null;
      const methodologyOpen = {};

      async function loadAois() {
        const aois = await (await fetch("/api/aois")).json();
        const select = document.getElementById("aoi-select");
        select.innerHTML = "";
        aois.forEach((aoi) => {
          aoiBboxById[aoi.id] = aoi.bbox;
          const option = document.createElement("option");
          option.value = aoi.id;
          option.textContent = `${aoi.name} (${aoi.event_count} events)`;
          select.appendChild(option);
        });
        if (aois.length) loadEvents(aois[0].id);
      }

      // Zoom to the selected AOI: [min_lon, min_lat, max_lon, max_lat] → Leaflet's
      // [[south, west], [north, east]].
      function zoomToAoi(aoiId) {
        const bbox = aoiBboxById[aoiId];
        if (!bbox) return;
        map.fitBounds(
          [
            [bbox[1], bbox[0]],
            [bbox[3], bbox[2]],
          ],
          { maxZoom: 12 },
        );
      }

      async function loadEvents(aoiId) {
        currentAoiId = aoiId;
        zoomToAoi(aoiId);
        loadRuns(aoiId);
        const collection = await (await fetch(`/api/aois/${aoiId}/events`)).json();
        if (eventsLayer) map.removeLayer(eventsLayer);
        // Drop layer references from the previous AOI so clicks can't zoom to
        // layers that are no longer on the map.
        Object.keys(layersById).forEach((id) => delete layersById[id]);
        eventsLayer = L.geoJSON(collection, {
          style: (f) => ({
            color: f.properties.status === "ongoing" ? "#c0392b" : "#2980b9",
            weight: 2,
          }),
          onEachFeature: (feature, layer) => {
            layersById[feature.properties.id] = layer;
            layer.on("click", () => showEvent(feature.properties.id));
          },
        }).addTo(map);

        const features = collection.features;
        document.getElementById("summary").textContent = `${features.length} disturbance events`;
        renderEventList(features);
        // The map frames the whole AOI (zoomToAoi above); clicking an event in
        // the list or on the map still zooms to that event.
      }

      function runStatusLabel(run) {
        if (
          run.status === "running" &&
          run.last_event_at &&
          Date.now() - Date.parse(run.last_event_at) > STALE_RUN_MS
        ) {
          return "running (stale — possibly interrupted)";
        }
        return run.status;
      }

      function describeEvent(ev) {
        const where =
          ev.batch_index != null ? `${ev.stage} ${ev.batch_index}/${ev.batch_total}` : ev.stage;
        let what = ev.outcome === "info" ? ev.message : ev.outcome;
        if (ev.outcome === "submitted") {
          what = `${ev.exports} export${ev.exports === 1 ? "" : "s"} submitted, waiting on Earth Engine`;
        } else if (ev.outcome === "succeeded" && ev.message) {
          // "N exported, M reused, K candidates" is self-describing.
          what = ev.message;
        } else if (ev.outcome !== "info" && ev.message) {
          what = `${ev.outcome} — ${ev.message}`;
        }
        return `${where} · ${what}`;
      }

      // One entry per batch: a batch's terminal event (succeeded/failed) replaces
      // its "submitted" line in place, so the tail reads one line per batch
      // instead of a submitted/succeeded pair. Non-batch events keep their own line.
      function collapseEvents(events) {
        const entries = [];
        const slotByBatch = {};
        events.forEach((ev) => {
          const key = ev.batch_index != null ? `${ev.stage}:${ev.batch_index}` : null;
          if (key != null && key in slotByBatch) {
            entries[slotByBatch[key]] = ev;
            return;
          }
          if (key != null) slotByBatch[key] = entries.length;
          entries.push(ev);
        });
        return entries;
      }

      function eventLine(ev) {
        const line = document.createElement("div");
        line.className = "run-event";
        if (ev.outcome === "failed") line.classList.add("run-event-failed");
        if (ev.outcome === "warning") line.classList.add("run-event-warning");
        const when = document.createElement("span");
        when.className = "muted";
        // Time only: the card header already carries the date, and the tail
        // spans minutes, not days.
        when.textContent = `${fmtTime(ev.occurred_at)} `;
        line.appendChild(when);
        line.appendChild(document.createTextNode(describeEvent(ev)));
        return line;
      }

      // The run's non-data inputs: methodology identity, expandable to the full
      // parameter set (threshold, min area, baseline window, EE script version…).
      function methodologySection(runId, m) {
        const meth = document.createElement("details");
        meth.className = "methodology";
        meth.open = methodologyOpen[runId] === true;
        meth.addEventListener("toggle", () => {
          methodologyOpen[runId] = meth.open;
        });
        const summary = document.createElement("summary");
        summary.textContent = `methodology ${m.name} @ ${m.version}`;
        meth.appendChild(summary);
        Object.entries(m.parameters || {}).forEach(([key, value]) => {
          const line = document.createElement("div");
          line.className = "param";
          line.textContent = `${key}: ${JSON.stringify(value)}`;
          meth.appendChild(line);
        });
        return meth;
      }

      function progressSection(progress) {
        const wrap = document.createElement("div");
        wrap.className = "run-progress";
        const pct = progress.batch_total
          ? Math.round((100 * progress.batch_index) / progress.batch_total)
          : 0;
        const label = document.createElement("div");
        label.className = "run-progress-label";
        const stage = document.createElement("strong");
        stage.textContent = `${progress.stage} exports`;
        label.appendChild(stage);
        label.appendChild(
          document.createTextNode(
            ` — batch ${progress.batch_index} of ${progress.batch_total} (${pct}%)`,
          ),
        );
        const track = document.createElement("div");
        track.className = "progress-track";
        const fill = document.createElement("div");
        fill.className = "progress-fill";
        fill.style.width = `${pct}%`;
        track.appendChild(fill);
        const counters = document.createElement("div");
        counters.className = "run-progress-counters muted";
        counters.textContent =
          `${progress.exports_completed} raster export${progress.exports_completed === 1 ? "" : "s"} completed` +
          (progress.batches_failed
            ? ` · ${progress.batches_failed} batch${progress.batches_failed === 1 ? "" : "es"} failed`
            : "");
        wrap.append(label, track, counters);
        return wrap;
      }

      async function loadRuns(aoiId) {
        const runs = await (await fetch(`/api/aois/${aoiId}/runs`)).json();
        if (aoiId !== currentAoiId) return; // a newer AOI selection won the race
        // Nothing changed since the last poll → leave the DOM alone. This keeps
        // the methodology toggle open, kills the 15 s rebuild flicker, and skips
        // the detail fetch. The stale flag is part of the key so a run crossing
        // the staleness threshold still re-renders.
        const renderKey =
          `${aoiId}:${runs.length ? runStatusLabel(runs[0]) : ""}:${JSON.stringify(runs)}`;
        if (renderKey === runsRenderKey) return;
        const container = document.getElementById("runs");
        if (!runs.length) {
          // Runs are recorded from the first pipeline run after this feature
          // landed; an explicit empty state beats a silently missing panel.
          container.innerHTML = "";
          const empty = document.createElement("div");
          empty.className = "run muted";
          empty.textContent =
            "No pipeline runs recorded yet — the next run (daily at 03:00 UTC, or started manually) will appear here live.";
          container.appendChild(empty);
          runsRenderKey = renderKey;
          return;
        }

        const latest = runs[0];
        const card = document.createElement("div");
        card.className = "run";
        card.innerHTML =
          `<strong>Pipeline run</strong> ` +
          `<span class="run-status-${latest.status}">${runStatusLabel(latest)}</span>` +
          `<div class="muted">started ${fmtDateTime(latest.started_at)} · ` +
          `window ${fmtDate(latest.since)} → ${fmtDate(latest.until)}</div>`;
        const detail = await (await fetch(`/api/runs/${latest.id}`)).json();
        if (aoiId !== currentAoiId) return;
        if (detail.methodology) card.appendChild(methodologySection(latest.id, detail.methodology));
        // The live view of a running run: overall position from the whole-run
        // progress aggregate, then the recent activity tail — the long Earth
        // Engine queue waits stay visible from the browser.
        if (latest.status === "running") {
          if (detail.progress) card.appendChild(progressSection(detail.progress));
          const tail = collapseEvents(detail.events).slice(-4);
          if (tail.length) {
            const eventsBox = document.createElement("div");
            eventsBox.className = "run-events";
            tail.forEach((ev) => eventsBox.appendChild(eventLine(ev)));
            card.appendChild(eventsBox);
          }
        } else if (latest.summary) {
          const s = latest.summary;
          const line = document.createElement("div");
          line.className = "run-line";
          line.textContent =
            `${s.index_rasters} indices (${s.index_rasters_reused} reused) · ` +
            `${s.change_rasters} changes (${s.change_rasters_reused} reused) · ` +
            `${s.export_failures} export failures`;
          card.appendChild(line);
        }
        // Clear only now that the card is fully built: no blank flash while the
        // detail fetch is in flight.
        container.innerHTML = "";
        container.appendChild(card);

        runs.slice(1, 5).forEach((run) => {
          const line = document.createElement("div");
          line.className = "run-line muted";
          line.innerHTML =
            `${fmtDateTime(run.started_at)} · ` +
            `<span class="run-status-${run.status}">${runStatusLabel(run)}</span>`;
          container.appendChild(line);
        });
        runsRenderKey = renderKey;
      }

      function renderEventList(features) {
        const container = document.getElementById("events");
        container.innerHTML = "";
        features.forEach((f) => {
          const p = f.properties;
          const div = document.createElement("div");
          div.className = "event";
          div.id = `event-${p.id}`;
          div.innerHTML =
            `<strong>Event #${p.id}</strong> ` +
            `<span class="status-${p.status}">${p.status}</span>` +
            `<div class="muted">first detected ${fmtDate(p.first_detected_at)} · ` +
            `footprint ${fmtArea(p.footprint_area_m2)} · ${p.observation_count} obs</div>`;
          div.onclick = () => showEvent(p.id);
          container.appendChild(div);
        });
      }

      async function showEvent(eventId) {
        document
          .querySelectorAll(".event")
          .forEach((el) => el.classList.remove("selected"));
        const card = document.getElementById(`event-${eventId}`);
        if (card) card.classList.add("selected");
        if (layersById[eventId]) map.fitBounds(layersById[eventId].getBounds(), { maxZoom: 14 });

        const detail = await (await fetch(`/api/events/${eventId}`)).json();
        const rows = detail.timeline
          .map(
            (m) =>
              `<div class="timeline">${fmtDate(m.observed_at)}: detected ${fmtArea(m.area_m2)}` +
              (m.growth_m2 != null ? ` (footprint +${fmtArea(m.growth_m2)})` : "") +
              `</div>`,
          )
          .join("");
        const evidence = detail.evidence
          .map((e) => `<div class="evidence">${e.change_type}: ${e.cog_path}</div>`)
          .join("");
        const card2 = document.getElementById(`event-${eventId}`);
        if (card2) {
          card2.querySelectorAll(".detail").forEach((el) => el.remove());
          const detailDiv = document.createElement("div");
          detailDiv.className = "detail";
          detailDiv.innerHTML =
            `<div class="timeline"><em>Timeline (expansion):</em></div>${rows}` +
            `<div class="timeline"><em>Evidence:</em></div>${evidence}`;
          card2.appendChild(detailDiv);
        }
      }

      function fmtDate(iso) {
        return iso ? iso.slice(0, 10) : "—";
      }
      function fmtDateTime(iso) {
        return iso ? iso.slice(0, 16).replace("T", " ") : "—";
      }
      function fmtTime(iso) {
        return iso ? iso.slice(11, 16) : "—";
      }
      function fmtArea(m2) {
        return m2 == null ? "—" : `${(m2 / 10000).toFixed(2)} ha`;
      }

      async function uploadAoi() {
        const status = document.getElementById("aoi-upload-status");
        const input = document.getElementById("aoi-file");
        status.className = "muted";
        const file = input.files[0];
        if (!file) {
          status.textContent = "Choose a .geojson file first.";
          return;
        }
        let document_;
        try {
          document_ = JSON.parse(await file.text());
        } catch (e) {
          status.className = "muted upload-error";
          status.textContent = "Not valid JSON.";
          return;
        }
        status.textContent = "Uploading…";
        const response = await fetch("/api/aois", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(document_),
        });
        const body = await response.json();
        if (!response.ok) {
          status.className = "muted upload-error";
          status.textContent = body.detail || `Upload failed (${response.status}).`;
          return;
        }
        status.textContent =
          `Added "${body.name}" — it will be processed on the next pipeline run, ` +
          `and committed to the instance repo (${body.file}) by the next ` +
          `"Update instance" workflow run.`;
        input.value = "";
        await loadAois();
        const select = document.getElementById("aoi-select");
        select.value = body.id;
        loadEvents(body.id);
      }

      async function runPipelineNow() {
        const button = document.getElementById("run-now");
        const status = document.getElementById("run-now-status");
        status.className = "muted";
        status.textContent = "Requesting…";
        button.disabled = true;
        try {
          const response = await fetch("/api/pipeline/run", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}",
          });
          const body = await response.json();
          if (!response.ok) {
            status.className = "muted upload-error";
            status.textContent = body.detail || `Failed (${response.status}).`;
            return;
          }
          status.textContent = "Run requested — it will appear below shortly.";
          // The runs panel polls every 15 s anyway; refresh sooner for feedback.
          setTimeout(() => currentAoiId != null && loadRuns(currentAoiId), 3000);
        } finally {
          button.disabled = false;
        }
      }

      document.getElementById("run-now").addEventListener("click", runPipelineNow);
      document.getElementById("aoi-upload").addEventListener("click", uploadAoi);
      document.getElementById("aoi-select").addEventListener("change", (e) =>
        loadEvents(e.target.value),
      );
      // Only the runs panel refreshes itself: it is the live view of an executing
      // run, while events/map stay event-driven off the selector and clicks.
      setInterval(() => {
        if (currentAoiId != null) loadRuns(currentAoiId);
      }, 15000);
      loadAois();
    </script>
  </body>
</html>
