# Scheduled pipeline run — the intended-direction scheduler for Slice 3 / epic E11
# (see docs/work-plan.md). It triggers the optical-change pipeline on the GCE VM
# over a rolling window. Disabled by default: you opt in by removing the
# `if: false` guard and uncommenting the `schedule` trigger.
#
# This is the GitHub-Actions-cron path from docs/architecture.md. The VM owns the
# Earth Engine credentials and the COG store; this workflow just kicks the run via
# SSH. Authentication uses Workload Identity Federation (set up per instance by
# scripts/setup_wif.sh) — short-lived OIDC tokens, no service-account keys.
#
# Required repository variables (printed by scripts/setup_wif.sh):
#   WIF_PROVIDER     workload identity provider resource name
#   PROVISIONER_SA   service account email to impersonate
# The project / VM name / zone come from the committed config/instance.env.

name: Scheduled pipeline run

on:
  workflow_dispatch:
  # Uncomment to enable the cron schedule (daily at 03:00 UTC):
  # schedule:
  #   - cron: "0 3 * * *"

permissions:
  id-token: write   # OIDC token for Workload Identity Federation
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    # Remove this guard once the variables above are configured.
    if: ${{ false }}
    steps:
      - uses: actions/checkout@v4

      - name: Load instance config
        run: |
          grep -E '^[A-Za-z_][A-Za-z0-9_]*=' config/instance.env >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.PROVISIONER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Trigger the pipeline run on the VM
        run: |
          gcloud compute ssh "${INSTANCE_NAME:-forest-sentinel-vm}" \
            --project "${PROJECT_ID}" \
            --zone "${ZONE:-us-west1-a}" \
            --command "sudo systemctl start forest-sentinel-pipeline.service"
